<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ankio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator,
      .htmx-request.htmx-indicator { display: inline-flex; }
    </style>
  </head>
  <body class="min-h-screen bg-stone-100 text-stone-950 antialiased">
    <main class="mx-auto w-full max-w-7xl px-4 py-5 sm:px-6 lg:px-8 lg:py-8">
      <header class="mb-5 flex min-h-12 flex-col justify-between gap-3 sm:flex-row sm:items-end">
        <div>
          <h1 class="text-2xl font-semibold leading-tight tracking-normal text-stone-950">Ankio</h1>
          <p class="mt-1 text-sm text-stone-600">Document storage and retention overview</p>
        </div>
        <div class="flex items-center gap-2 text-sm text-stone-500">
          <span class="inline-flex h-2 w-2 rounded-full bg-emerald-600"></span>
          <span>Local storage</span>
        </div>
      </header>

      <div class="grid gap-5 lg:grid-cols-[minmax(0,1.05fr)_minmax(420px,0.95fr)]">
        <section class="overflow-hidden rounded-lg border border-stone-200 bg-white shadow-sm" aria-labelledby="document-title">
          <div class="flex items-center justify-between gap-3 border-b border-stone-200 px-5 py-4">
            <h2 id="document-title" class="text-base font-semibold leading-6 text-stone-950">Document</h2>
            <span id="create-status" class="htmx-indicator items-center gap-2 text-sm font-medium text-emerald-700">
              <span class="h-2 w-2 animate-pulse rounded-full bg-emerald-600"></span>
              Generating
            </span>
          </div>
          <div class="p-5">
            <form
              hx-post="/notes"
              hx-target="#create-result"
              hx-swap="innerHTML"
              hx-indicator="#create-status"
              class="space-y-4"
            >
              <div>
                <label for="content" class="mb-2 block text-sm font-medium text-stone-700">Source</label>
                <textarea
                  id="content"
                  name="content"
                  required
                  spellcheck="true"
                  class="block min-h-80 w-full resize-y rounded-md border border-stone-300 bg-stone-50 px-3 py-3 text-sm leading-6 text-stone-950 shadow-inner outline-none transition focus:border-emerald-600 focus:bg-white focus:ring-4 focus:ring-emerald-600/15 max-sm:min-h-56"
                ></textarea>
              </div>
              <div class="flex justify-end">
                <button
                  type="submit"
                  class="inline-flex h-10 items-center justify-center rounded-md bg-emerald-700 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-800 focus:outline-none focus:ring-4 focus:ring-emerald-700/20"
                >
                  Add document
                </button>
              </div>
            </form>
          </div>
        </section>

        <section class="overflow-hidden rounded-lg border border-stone-200 bg-white shadow-sm" aria-labelledby="overview-title">
          <div class="flex items-center justify-between gap-3 border-b border-stone-200 px-5 py-4">
            <h2 id="overview-title" class="text-base font-semibold leading-6 text-stone-950">Retention</h2>
            <button
              type="button"
              aria-label="Refresh overview"
              title="Refresh overview"
              hx-get="/overview"
              hx-target="#overview-panel"
              hx-swap="outerHTML"
              class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-stone-300 bg-white text-stone-700 shadow-sm transition hover:bg-stone-50 focus:outline-none focus:ring-4 focus:ring-stone-400/20"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                <path d="M3 21v-5h5"></path>
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                <path d="M16 8h5V3"></path>
              </svg>
            </button>
          </div>
          {% include "partials/overview_panel.html" %}
        </section>
      </div>

      <section class="mt-5 overflow-hidden rounded-lg border border-stone-200 bg-white shadow-sm" aria-labelledby="notes-title">
        <div class="flex items-center justify-between gap-3 border-b border-stone-200 px-5 py-4">
          <h2 id="notes-title" class="text-base font-semibold leading-6 text-stone-950">Generated notes</h2>
        </div>
        <div id="create-result">
          {% include "partials/notes_panel.html" %}
        </div>
      </section>
    </main>
  </body>
</html>
